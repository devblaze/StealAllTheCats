services:
  stealallthecats:
    container_name: stealallthecats
    build:
      context: .
      dockerfile: StealAllTheCats/Dockerfile
    image: stealallthecats:latest
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=db;Database=CatsDb;User Id=sa;Password=Dev@12345;TrustServerCertificate=True

  db:
    container_name: stealallthecats_db
    image: mcr.microsoft.com/mssql/server:2022-latest
    ports:
      - "1433:1433"
    environment:
      MSSQL_SA_PASSWORD: "Dev@12345"
      ACCEPT_EULA: "Y"
    volumes:
      - catdb-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Dev@12345" -C -Q "SELECT 1" || exit 1
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

volumes:
  catdb-data:
