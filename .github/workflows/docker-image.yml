name: Docker Compose CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  docker-compose-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build and start services
        run: docker compose up -d --build

      - name: Wait for SQL Server health check
        run: |
          echo "Waiting for SQL Server to be healthy..."
          for i in $(seq 1 30); do
            if docker inspect --format='{{.State.Health.Status}}' stealallthecats_db 2>/dev/null | grep -q healthy; then
              echo "SQL Server is healthy"
              break
            fi
            echo "Attempt $i/30 - waiting 5s..."
            sleep 5
          done

      - name: Wait for application startup
        run: |
          echo "Waiting for the application to respond..."
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8080/swagger/index.html > /dev/null 2>&1; then
              echo "Application is up"
              break
            fi
            echo "Attempt $i/20 - waiting 3s..."
            sleep 3
          done

      - name: Verify Swagger is reachable
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" http://localhost:8080/swagger/index.html)
          if [ "$STATUS" -eq 200 ]; then
            echo "Swagger UI is accessible (HTTP $STATUS)"
          else
            echo "Swagger UI returned HTTP $STATUS"
            exit 1
          fi

      - name: Verify GET /api/cats returns 200
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" http://localhost:8080/api/cats)
          echo "GET /api/cats returned HTTP $STATUS"
          [ "$STATUS" -eq 200 ] || exit 1

      - name: Verify POST /api/cat-imports returns 202
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" -X POST http://localhost:8080/api/cat-imports)
          echo "POST /api/cat-imports returned HTTP $STATUS"
          [ "$STATUS" -eq 202 ] || exit 1

      - name: Verify GET /api/cat-imports/{id} returns job status
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:8080/api/cat-imports)
          JOB_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "Created import job $JOB_ID"
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" http://localhost:8080/api/cat-imports/$JOB_ID)
          echo "GET /api/cat-imports/$JOB_ID returned HTTP $STATUS"
          [ "$STATUS" -eq 200 ] || exit 1

      - name: Verify Blazor UI is reachable
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" http://localhost:8080/ui)
          echo "GET /ui returned HTTP $STATUS"
          [ "$STATUS" -eq 200 ] || exit 1

      - name: Print application logs on failure
        if: failure()
        run: docker compose logs stealallthecats

      - name: Tear down
        if: always()
        run: docker compose down -v
