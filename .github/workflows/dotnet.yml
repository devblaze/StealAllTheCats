name: .NET CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Run tests
        run: dotnet test --no-build -c Release --verbosity normal --collect:"XPlat Code Coverage"

      - name: Publish
        run: dotnet publish -c Release -o ./publish --self-contained false

      - name: Verify application starts
        run: |
          dotnet ./publish/StealAllTheCats.dll &
          APP_PID=$!
          sleep 8
          if ps -p $APP_PID > /dev/null; then
            echo "Application started successfully"
            kill $APP_PID
          else
            echo "Application failed to start"
            exit 1
          fi
